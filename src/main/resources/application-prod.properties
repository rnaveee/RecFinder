# Applied only when the "prod" profile is active
# (activate with the SPRING_PROFILES_ACTIVE=prod environment variable).

# Quiet logging in production.
logging.level.com.recfinder=WARN

# --- Database connection (production) ---
# NEVER hardcode prod credentials. These are read from environment variables that
# the host/secret-manager injects at runtime. If a variable is missing, startup
# fails fast (the ":" with no default = required).
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}