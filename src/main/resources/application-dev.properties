# Applied only when the "dev" profile is active.

# --- JWT (dev only — use a long random secret in prod, injected via env var) ---
jwt.secret=dev-secret-key-must-be-at-least-32-characters-long-for-hmac
jwt.expiration-ms=86400000

# Verbose logging for our own code while developing.
logging.level.com.recfinder=DEBUG

# --- Database connection (local dev) ---
# Plain credentials are fine here because this only ever points at your LOCAL
# learning database. Production uses injected secrets (see application-prod.properties).
spring.datasource.url=jdbc:postgresql://localhost:5432/recfinder
spring.datasource.username=postgres
spring.datasource.password=postgres

# Print the SQL Hibernate generates, nicely formatted, so you can learn what JPA does.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Show the full health payload (incl. DB connectivity) at /actuator/health in dev.
management.endpoint.health.show-details=always