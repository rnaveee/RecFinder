spring.application.name=RecFinder

# Shared defaults live here. Environment-specific overrides go in
# application-dev.properties / application-prod.properties and are applied
# based on the active profile below.
#
# Default to the "dev" profile for local development. In production, override
# this with the SPRING_PROFILES_ACTIVE=prod environment variable (never edit
# this file to switch environments).
spring.profiles.active=dev

# --- JPA / Hibernate (shared) ---
# Flyway owns the schema, so Hibernate must NOT create or alter tables. "validate"
# means: on startup, check that every @Entity matches an existing table, and fail
# loudly if they drift apart. This is the safe production setting.
spring.jpa.hibernate.ddl-auto=validate
# Disable Open-Session-In-View. It's an anti-pattern that quietly keeps a DB session
# open during view rendering and hides lazy-loading bugs. Off by choice, on purpose.
spring.jpa.open-in-view=false

# --- Actuator (shared) ---
# Expose only the health endpoint over HTTP (not env, beans, etc.).
management.endpoints.web.exposure.include=health
